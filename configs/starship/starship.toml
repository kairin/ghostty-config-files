# starship.toml — managed-by: ghostty-config-files
# Catppuccin Mocha prompt to match the repo's Ghostty/tmux theme.
# Symlinked to ~/.config/starship.toml by scripts/install.sh.
# Replaces the old powerlevel10k prompt (p10k config is zsh-specific, not portable).

palette = "catppuccin_mocha"

format = """
[](surface0)\
$os\
$username\
[](bg:peach fg:surface0)\
$directory\
[](fg:peach bg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$nodejs\
$python\
$golang\
$rust\
[](fg:teal bg:surface0)\
$cmd_duration\
[ ](fg:surface0)\
$line_break\
$character"""

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Ubuntu = " "
Linux = " "

[username]
show_always = false
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:red"
format = '[ $user]($style)'

[directory]
style = "fg:crust bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Apps" = " "

[git_branch]
symbol = ""
style = "bg:green"
format = '[[ $symbol $branch ](fg:crust bg:green)]($style)'

[git_status]
style = "bg:green"
format = '[[($all_status$ahead_behind )](fg:crust bg:green)]($style)'

[nodejs]
symbol = ""
style = "bg:teal"
format = '[[ $symbol ($version) ](fg:crust bg:teal)]($style)'

[python]
symbol = ""
style = "bg:teal"
format = '[[ $symbol ($version) ](fg:crust bg:teal)]($style)'

[golang]
symbol = ""
style = "bg:teal"
format = '[[ $symbol ($version) ](fg:crust bg:teal)]($style)'

[rust]
symbol = ""
style = "bg:teal"
format = '[[ $symbol ($version) ](fg:crust bg:teal)]($style)'

[cmd_duration]
min_time = 500
style = "fg:text bg:surface0"
format = '[  $duration ]($style)'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
